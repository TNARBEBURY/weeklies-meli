function usd(n,s){if(!n||n===0)return"$0";if(s&&Math.abs(n)>=1e6)return"$"+(n/1e6).toFixed(2)+"M";if(s&&Math.abs(n)>=1e3)return"$"+Math.round(n/1e3)+"K";return"$"+Math.round(n).toLocaleString("es-AR");}
function dlt(p){const d=p-100,c=d>=0?"#00A650":d>=-15?"#FF7733":"#F23D4F";return`<span style="color:${c};font-weight:700">${d>=0?"+":""}${d.toFixed(1)}%</span>`;}
function gB(g,p){const[bg,fg]=g>=0?["#D4F5E2","#007A3D"]:p>=85?["#FFF0C0","#8B5000"]:["#FFD5DA","#C0002F"];return`<span class="b" style="background:${bg};color:${fg}">${usd(g,true)}</span>`;}
function dash(n){return n>0?usd(n):'<span style="color:#8492A6">—</span>';}

let fP=new Set(),selH=new Set();const HC=["#009EE3","#00A650","#8B5CF6","#FF7733","#F23D4F"];
let mc=null;

function amos(ym,n){let y=parseInt(ym.slice(0,4)),m=parseInt(ym.slice(4))+n;while(m>12){m-=12;y++;}while(m<1){m+=12;y--;}return`${y}${String(m).padStart(2,"0")}`;}
function hc(acc){return!acc.eta||amos(acc.eta,2)>=D.today_ym;}
function gAttr(h,p){
  const ac=D.hunters[h].accounts.filter(a=>!p||(p instanceof Set?p.size===0:!p)||(a.eta&&a.eta<D.today_ym)||(p instanceof Set?p.has(a.probability):a.probability===p));
  const nM={},cM={};D.month_keys.forEach(ym=>{nM[ym]=0;cM[ym]=0;});
  ac.forEach(a=>{const e=a.eta;if(!e)return;if(nM[e]!==undefined)nM[e]+=a.monthly[e]||0;[1,2].forEach(n=>{const d=amos(e,n);if(cM[d]!==undefined)cM[d]+=a.monthly[d]||0;});});
  const t={};D.month_keys.forEach(ym=>t[ym]=(nM[ym]||0)+(cM[ym]||0));return t;
}
function tAttr(p){
  const al=[];D.hunter_list.forEach(h=>D.hunters[h].accounts.forEach(a=>{if(!p||(a.eta&&a.eta<D.today_ym)||a.probability===p)al.push(a);}));
  const nM={},cM={};D.month_keys.forEach(ym=>{nM[ym]=0;cM[ym]=0;});
  al.forEach(a=>{const e=a.eta;if(!e)return;if(nM[e]!==undefined)nM[e]+=a.monthly[e]||0;[1,2].forEach(n=>{const d=amos(e,n);if(cM[d]!==undefined)cM[d]+=a.monthly[d]||0;});});
  const t={};D.month_keys.forEach(ym=>t[ym]=(nM[ym]||0)+(cM[ym]||0));return t;
}

// KPIs

const k=D.kpi,gc=k.gap>=0?"kgp":"kgn";
document.getElementById("kgrid").innerHTML=`
  <div class="kc kp"><div class="kl">Plan ${k.cur_label}</div><div class="kv">${k.plan_fmt}</div></div>
  <div class="kc kcu"><div class="kl">TPV Current</div><div class="kv">${k.current_fmt}</div></div>
  <div class="kc kn"><div class="kl">TPV New</div><div class="kv">${k.new_fmt}</div></div>
  <div class="kc kt"><div class="kl">Total TPV</div><div class="kv">${k.total_fmt}</div><div class="ks">${k.pct.toFixed(1)}% vs Plan</div></div>
  <div class="kc ${gc}"><div class="kl">Gap vs Plan</div><div class="kv">${k.gap_fmt}</div></div>`;

// Prob pills
document.getElementById("pPills").innerHTML=
  `<span class="pill on" data-p="" onclick="sP('')">Todas</span>`+
  D.prob_list.map(p=>`<span class="pill p${p[0]}" data-p="${p}" onclick="sP('${p}')">${p}</span>`).join("");
function sP(p){
  if(!p){fP.clear();}
  else if(fP.has(p)){fP.delete(p);}
  else{fP.add(p);}
  const none=fP.size===0;
  document.querySelectorAll("#pPills .pill").forEach(el=>{
    const ep=el.dataset.p,ia=!ep?none:fP.has(ep);
    el.className="pill"+(ep?" p"+ep[0]:"")+(ia?" on":(none?"":" off"));
  });
  ref();
}

// Hunter pills
document.getElementById("hPills").innerHTML=
  `<span class="pill on" data-h="" onclick="tH('')">Todos</span>`+
  D.hunter_list.map((h,i)=>`<span class="pill" data-h="${h}" onclick="tH('${h}')">${h.split(" ")[0]}</span>`).join("");
function tH(name){
  if(!name)selH.clear();else{if(selH.has(name))selH.delete(name);else selH.add(name);}
  document.querySelectorAll("#hPills .pill").forEach(el=>{
    const h=el.dataset.h,ia=!h?selH.size===0:selH.has(h);
    el.className="pill"+(ia?" on":selH.size>0?" off":"");
    if(ia&&h){const i=D.hunter_list.indexOf(h);el.style.background=HC[i%HC.length];el.style.color="white";el.style.borderColor=HC[i%HC.length];}
    else{el.style.background="";el.style.color="";el.style.borderColor="";}
  });
  ref();
}

function ref(){bMT();bMC();bHS();}

function bMT(){
  const ms=D.monthly.filter(r=>r.plan>0||r.current>0||r.new>0);
  const names=selH.size>0?[...selH]:null;

  // Calcular New y Current por separado para todos los meses
  let aN={},aC={};
  D.month_keys.forEach(ym=>{aN[ym]=0;aC[ym]=0;});
  if(names||fP){
    const hunts=names||D.hunter_list;
    hunts.forEach(h=>{
      D.hunters[h].accounts.forEach(a=>{
        if(fP.size>0&&!(a.eta&&a.eta<D.today_ym)&&!fP.has(a.probability))return;
        const e=a.eta;if(!e)return;
        if(aN[e]!==undefined)aN[e]+=a.monthly[e]||0;
        [1,2].forEach(n=>{const d=amos(e,n);if(aC[d]!==undefined)aC[d]+=a.monthly[d]||0;});
      });
    });
  }
  const useAttr=names||fP;
  const tvNew=ym=>useAttr?(aN[ym]||0):null;
  const tvCur=ym=>useAttr?(aC[ym]||0):null;
  const tv=r=>useAttr?((aN[r.ym]||0)+(aC[r.ym]||0)):r.total;

  const planForMonth=r=>names?names.reduce((s,h)=>s+(D.hunters[h].has_plan?(D.hunters[h].plan[r.ym]||0):0),0):r.plan;
  const tp=ms.reduce((s,r)=>s+planForMonth(r),0);
  const tt=ms.reduce((s,r)=>s+tv(r),0);
  const tg=tt-tp,tpc=tp>0?tt/tp*100:0;

  const hdr=ms.map(r=>`<th class="r">${r.label}${r.is_cur?' <span class="b bB" style="font-size:8px">HOY</span>':""}</th>`).join("")+`<th class="r" style="background:#FFF9C0;border-left:2px solid #1C2B59">TOTAL</th>`;
  const mk=(lbl,fn,tot,col,bld)=>{const s=bld?"font-weight:700;":"",c=col?`color:${col};`:"";
    return`<tr><td style="${s}${c}">${lbl}</td>${ms.map(r=>`<td class="r ${r.is_cur?"cur":""}" style="${s}${c}">${dash(fn(r))}</td>`).join("")}<td class="r" style="${s}${c}background:#FFF9C0;border-left:2px solid #1C2B59">${usd(tot)}</td></tr>`;};

  const gR=`<tr><td>Gap</td>${ms.map(r=>{const p=planForMonth(r),g=tv(r)-p,pct=p>0?tv(r)/p*100:0;return`<td class="r ${r.is_cur?"cur":""}">${p>0?gB(g,pct):"—"}</td>`;}).join("")}<td class="r" style="background:#FFF9C0;border-left:2px solid #1C2B59">${gB(tg,tpc)}</td></tr>`;
  const pR=`<tr><td>% vs Plan</td>${ms.map(r=>{const p=planForMonth(r),pct=p>0?tv(r)/p*100:null;return`<td class="r ${r.is_cur?"cur":""}">${pct!==null?dlt(pct):"—"}</td>`;}).join("")}<td class="r" style="background:#FFF9C0;border-left:2px solid #1C2B59">${tpc>0?dlt(tpc):"—"}</td></tr>`;

  const tnN=ms.reduce((s,r)=>s+(tvNew(r.ym)||0),0);
  const tnC=ms.reduce((s,r)=>s+(tvCur(r.ym)||0),0);
  const tc=useAttr?0:ms.reduce((s,r)=>s+r.current,0);
  const tn=useAttr?0:ms.reduce((s,r)=>s+r.new,0);
  const ttt=useAttr?tt:ms.reduce((s,r)=>s+r.total,0);

  const nLabel=names?`TPV New (${names.map(h=>h.split(" ")[0]).join("+")})`:fP?`TPV New (${fP})`:"TPV New";
  const cLabel=names?`TPV Current (${names.map(h=>h.split(" ")[0]).join("+")})`:fP?`TPV Current (${fP})`:"TPV Current";

  document.getElementById("mt").innerHTML=`<table><thead><tr><th>Métrica</th>${hdr}</tr></thead><tbody>`+
    mk("Plan",planForMonth,tp)+
    mk(nLabel,r=>useAttr?(tvNew(r.ym)||0):r.new,useAttr?tnN:tn,"#00A650")+
    mk(cLabel,r=>useAttr?(tvCur(r.ym)||0):r.current,useAttr?tnC:tc,"#009EE3")+
    `<tr class="tot"><td>Total TPV</td>${ms.map(r=>`<td class="r" style="color:#007A3D">${dash(tv(r))}</td>`).join("")}<td class="r" style="color:#007A3D;background:#FFF9C0;border-left:2px solid #1C2B59">${usd(ttt)}</td></tr>`+
    gR+pR+`</tbody></table>`;
}
function bMC(){
  if(mc){mc.destroy();mc=null;}
  const ms=D.monthly.filter(r=>r.plan>0||r.current>0||r.new>0);
  // Combinar filtro de hunters Y probabilidad para el grafico
  let ovC=null;
  const names=selH.size>0?[...selH]:null;
  if(names||fP.size>0){
    const agg={};D.month_keys.forEach(ym=>agg[ym]=0);
    const hunts=names||D.hunter_list;
    hunts.forEach(h=>{const a=gAttr(h,fP.size>0?fP:null);D.month_keys.forEach(ym=>agg[ym]+=(a[ym]||0));});
    ovC=agg;
  }
  const tot=ms.map(r=>ovC?(ovC[r.ym]||0):r.total);
  // Plan: usar plan individual si hay hunters seleccionados
  const planData=ms.map(r=>names
    ?names.reduce((s,h)=>s+(D.hunters[h].has_plan?(D.hunters[h].plan[r.ym]||0):0),0)
    :r.plan);
  const pcts=ms.map(r=>r.plan>0?(tot[ms.indexOf(r)]/r.plan*100):null);
  const ci=ms.findIndex(r=>r.is_cur);
  const bgP={id:"bg",beforeDraw:c=>{const x=c.canvas.getContext("2d");x.save();x.fillStyle="#FFE600";x.fillRect(0,0,c.width,c.height);x.restore();}};mc=new Chart(document.getElementById("mc").getContext("2d"),{plugins:[bgP],type:"bar",data:{labels:ms.map(r=>r.label),datasets:[
    {label:"Plan",data:planData,backgroundColor:"rgba(28,43,89,0.5)",borderColor:"rgba(28,43,89,0.8)",borderWidth:1.5,borderRadius:4,order:2},
    {label:"Total TPV",data:tot,backgroundColor:"rgba(0,158,80,0.65)",borderColor:"rgba(0,122,61,0.9)",borderWidth:1.5,borderRadius:4,order:1},
    {label:"% vs Plan",data:pcts,type:"line",yAxisID:"y2",borderColor:"#FF7733",backgroundColor:"rgba(255,119,51,.08)",pointBackgroundColor:pcts.map(p=>p===null?"transparent":p>=100?"#00A650":p>=85?"#FF7733":"#F23D4F"),pointRadius:5,tension:.3,spanGaps:false,order:0}
  ]},options:{responsive:true,maintainAspectRatio:false,interaction:{intersect:false,mode:"index"},
    plugins:{legend:{labels:{color:"#1C2B59",font:{size:11},boxWidth:12}},
      tooltip:{backgroundColor:"#1C2B59",titleColor:"#FFE600",bodyColor:"#fff",callbacks:{label:c=>c.dataset.label==="% vs Plan"?c.parsed.y!=null?` ${c.parsed.y.toFixed(1)}%`:"":` ${c.dataset.label}: ${usd(c.parsed.y)}`}}},
    scales:{x:{grid:{color:"rgba(28,43,89,.1)"},ticks:{color:"#1C2B59"}},
      y:{grid:{color:"rgba(28,43,89,.1)"},ticks:{color:"#1C2B59",callback:v=>v>=1e6?`$${v/1e6}M`:v>=1e3?`$${v/1e3}K`:`$${v}`}},
      y2:{position:"right",grid:{drawOnChartArea:false},ticks:{color:"#FF7733",callback:v=>v+"%"}}}}});
}

function bHS(){
  const body=document.getElementById("hb");
  const names=selH.size>0?[...selH]:D.hunter_list;
  const fk=D.month_keys.slice(D.future_idx),fl=D.month_labels.slice(D.future_idx);
  const cards=names.map((h,ii)=>{const i=D.hunter_list.indexOf(h),col=HC[i%HC.length];
    const at=gAttr(h,fP),fut=fk.reduce((s,ym)=>s+(at[ym]||0),0);
    const ac=D.hunters[h].accounts.filter(a=>(fP.size===0||(a.eta&&a.eta<D.today_ym)||fP.has(a.probability))&&hc(a)).length;
    return`<div class="hcard" style="border-top:3px solid ${col}" onclick="tH('${h}')"><div style="font-size:10px;color:#8492A6;font-weight:600">${h.split(" ")[0]}</div><div style="font-size:16px;font-weight:800;color:${col}">${usd(fut,true)}</div><div style="font-size:10px;color:#8492A6">${ac} cuentas</div></div>`;
  }).join("");
  const al=[];names.forEach(h=>{D.hunters[h].accounts.forEach(a=>{
    if(fP.size>0&&!(a.eta&&a.eta<D.today_ym)&&!fP.has(a.probability))return;
    if(!hc(a))return;const ft=fk.reduce((s,ym)=>s+(a.monthly[ym]||0),0);
    if(ft>0)al.push({...a,_h:h,_ft:ft});
  });});
  al.sort((a,b)=>(a.eta||"9").localeCompare(b.eta||"9")||a._h.localeCompare(b._h));
  const colH=fl.map(l=>`<th class="r">${l}</th>`).join("");
  const rows=al.map(a=>{const i=D.hunter_list.indexOf(a._h),col=HC[i%HC.length];
    const pb=a.probability,pc=pb==="Alta"?"bG":pb==="Media"?"bA":"bR";
    const cells=fk.map(ym=>{const v=a.monthly[ym]||0,isE=a.eta===ym;return`<td class="r">${v>0?`<span ${isE?'style="color:#8B5CF6;font-weight:700"':""}>${usd(v)}</span>`:"—"}</td>`;}).join("");
    return`<tr><td><span class="b" style="background:${col}22;color:${col};font-size:10px">${a._h.split(" ")[0]}</span></td><td><b>${a.name}</b></td><td>${a.eta?`<span class="b bP" style="font-size:9px">${a.eta_label||a.eta}</span>`:"—"}</td><td>${pb?`<span class="b ${pc}">${pb}</span>`:"—"}</td>${cells}<td class="r" style="font-weight:700;color:#009EE3">${usd(a._ft)}</td></tr>`;
  }).join("");
  const tm=fk.map(ym=>al.reduce((s,a)=>s+(a.monthly[ym]||0),0)),gd=al.reduce((s,a)=>s+a._ft,0);
  const tc=tm.map(v=>`<td class="r" style="font-weight:700">${v>0?usd(v):"—"}</td>`).join("");
  body.innerHTML=`<div class="sec"><div class="sh"><b>Pipeline por Hunter</b></div><div class="sb">
    <div class="hgrid">${cards}</div>
    <div style="overflow-x:auto"><table>
      <thead><tr><th>Hunter</th><th>Cuenta</th><th>ETA</th><th>Prob.</th>${colH}<th class="r">Total</th></tr></thead>
      <tbody>${rows}<tr class="tot"><td colspan="4">TOTAL</td>${tc}<td class="r" style="color:#009EE3">${usd(gd)}</td></tr></tbody>
    </table></div>
  </div></div>`;
}

ref();
</script>
